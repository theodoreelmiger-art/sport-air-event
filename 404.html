<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Sport Air Event</title>
    <script type="text/javascript">
      // spa-github-pages redirect (https://github.com/rafgraph/spa-github-pages)
      // Encodes the deep-link path into a query string and bounces to the app root,
      // where the restore script in index.html rewrites it back to a clean URL.
      var pathSegmentsToKeep = 1; // project page: keep "/sport-air-event"
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
